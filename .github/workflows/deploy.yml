name: deploy

on:
  # 每当 push 到 main 分支时触发部署
  # Deployment is triggered whenever a push is made to the main branch.
  push:
    branches: [master]
  # 手动触发部署
  # Manually trigger deployment
  workflow_dispatch:

jobs:
  # ============================================================
  # 构建并部署 博客(VuePress) + 图库(Afilmory SPA)
  # Build & deploy: blog (VuePress) + gallery (Afilmory SPA)
  # ============================================================
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # "最近更新时间" 等 git 日志相关信息，需要拉取全部提交记录
          # "Last updated time" and other git log-related information require fetching all commit records.
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 启用 pnpm（Afilmory 使用 pnpm 管理依赖）
      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      # 安装博客(VuePress)依赖
      - name: Install Docs Dependencies
        run: npm ci

      # 安装图库(Afilmory)依赖
      - name: Install Afilmory Dependencies
        run: cd afilmory && pnpm install --frozen-lockfile

      # 构建所有静态资源（先构建图库嵌入 docs/public，再构建 VuePress）
      - name: Build All (Gallery + Docs)
        env:
          NODE_OPTIONS: --max_old_space_size=8192
        run: npm run build

      # 部署到 GitHub Pages（gh-pages 分支）
      # @see https://github.com/crazy-max/ghaction-github-pages
      - name: Deploy to GitHub Pages
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: gh-pages
          build_dir: docs/.vuepress/dist
        env:
          # @see https://docs.github.com/cn/actions/reference/authentication-in-a-workflow#about-the-github_token-secret
          GITHUB_TOKEN: ${{ secrets.LINX }}
